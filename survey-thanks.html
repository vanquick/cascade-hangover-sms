<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanks! — Cascade Hangover League</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            text-align: center;
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 48px 36px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 480px;
        }
        .emoji { font-size: 3em; margin-bottom: 16px; }
        h1 { font-size: 1.8em; color: #fff; margin-bottom: 12px; }
        p { font-size: 1.1em; color: #a0b4d0; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="card">
        <div class="emoji">🏆🍻</div>
        <h1>You're locked in.</h1>
        <p>Thanks for filling that out — your responses are headed to the commissioner. Get ready for the intro video.</p>
    </div>
</body>
</html>
